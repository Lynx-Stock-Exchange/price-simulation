server:
  port: 8080

logging:
  level:
    org.apache.kafka: ERROR

spring:
  application:
    name: price-simulation-engine
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: price-sim-consumer-group
      auto-offset-reset: latest
      # Expecting JSON payloads for incoming Orders
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      #value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "com.lynx.simulation.model.*"
    producer:
      # Sending JSON payloads for Market Events and Price Updates
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    #disabling non functioning kafka
    listener:
      auto-startup: false


  # 2. The In-Memory Cache (Redis)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # 3. The Ledger (PostgreSQL / TimescaleDB)
  datasource:
    url: jdbc:postgresql://localhost:5432/stock_exchange
    username: postgres # Replace with your local/dev credentials
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# 4. Engine-Specific Parameters (Custom)
simulation:
  tick-rate-ms: 1000
  auto-event-probability: 0.005
  market-open-hour: 9
  market-close-hour: 17
